<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

.pantalla{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.activa{
display:flex;
}

img{
max-width:90%;
border-radius:10px;
}

button{
padding:15px 25px;
margin-top:20px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#000;
color:white;
}

.botones{
margin-top:20px;
}

.botones a{
display:block;
margin:10px;
padding:12px;
background:black;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<div id="pantalla1" class="pantalla activa">

<img src="https://via.placeholder.com/400x500?text=Sobre+Cerrado">

<button onclick="abrirInvitacion()">Abrir invitación</button>

</div>

<div id="pantalla2" class="pantalla">

<img src="https://via.placeholder.com/400x500?text=Invitacion+Abierta">

<div class="botones">

<a href="https://maps.google.com" target="_blank">Ver ubicación</a>

<a href="https://wa.me/" target="_blank">Confirmar asistencia</a>

</div>

</div>

<script>

function abrirInvitacion(){

document.getElementById("pantalla1").style.display="none";
document.getElementById("pantalla2").style.display="flex";

}

</script>

</body>
</html>
