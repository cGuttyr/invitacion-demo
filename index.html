<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:100%;
max-width:420px;
height:100vh;
position:relative;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:opacity 0.8s;
}

.hidden{
opacity:0;
pointer-events:none;
}

img{
width:100%;
height:auto;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:black;
cursor:pointer;
}

.botones{
position:absolute;
bottom:80px;
display:flex;
flex-direction:column;
gap:15px;
}

.botones a{
text-decoration:none;
background:white;
color:black;
padding:12px 25px;
border-radius:20px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<!-- Pantalla 1 -->

<div id="pantalla1" class="screen">

<img src="sobre.jpg">

<button onclick="abrir()">Abrir invitación</button>

</div>

<!-- Pantalla 2 -->

<div id="pantalla2" class="screen hidden">

<img src="invitacion.jpg">

<div class="botones">

<a href="https://maps.google.com" target="_blank">Ver ubicación</a>

<a href="https://wa.me/573000000000" target="_blank">Confirmar asistencia</a>

</div>

</div>

</div>

<script>

function abrir(){

document.getElementById("pantalla1").classList.add("hidden");

document.getElementById("pantalla2").classList.remove("hidden");

}

</script>

</body>

</html>
