<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>Invitación</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100%;
height:100vh;
overflow:hidden;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
height:100vh;
max-width:500px;
position:relative;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

button{
position:absolute;
bottom:80px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.click-area{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<!-- Pantalla 1 -->

<div id="pantalla1" class="screen">

<img src="Portada invitacion 1.jpg">

<div class="click-area" onclick="abrir()"></div>

</div>

<!-- Pantalla 2 -->

<div id="pantalla2" class="screen hidden">

<img src="invitacion.jpg">

<div class="botones">

<a href="https://maps.google.com" target="_blank">Ver ubicación</a>

<a href="https://wa.me/573000000000" target="_blank">Confirmar asistencia</a>

</div>

</div>

</div>

<script>

function abrir(){

document.getElementById("pantalla1").classList.add("hidden");

document.getElementById("pantalla2").classList.remove("hidden");

}

</script>

</body>

</html>
