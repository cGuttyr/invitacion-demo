<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<title>Invitación</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100%;
height:100vh;
overflow:hidden;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
height:100vh;
max-width:500px;
position:relative;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

img{
width:100%;
height:100%;
object-fit:cover;
}

/* Área clickeable completa */

.click-area{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
cursor:pointer;
}

/* Botones */

.botones{
position:absolute;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
opacity:0;
pointer-events:none;
transition:opacity 0.6s ease;
}

.botones a{
background:white;
padding:15px 25px;
border-radius:30px;
text-decoration:none;
color:black;
font-size:16px;
font-weight:bold;
}

/* Pantalla oculta */

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<!-- Pantalla 1 -->

<div id="pantalla1" class="screen">

<img src="sobre.jpg">

<div class="click-area" onclick="abrir()"></div>

</div>

<!-- Pantalla 2 -->

<div id="pantalla2" class="screen hidden">

<img src="invitacion.jpg">

<div id="botones" class="botones">

<a href="https://maps.google.com" target="_blank">Ver ubicación</a>

<a href="https://wa.me/573197980315" target="_blank">Confirmar asistencia</a>

</div>

</div>

</div>

<script>

function abrir(){

document.getElementById("pantalla1").classList.add("hidden");

document.getElementById("pantalla2").classList.remove("hidden");

/* Mostrar botones después de abrir */

setTimeout(() => {

document.getElementById("botones").style.opacity = "1";
document.getElementById("botones").style.pointerEvents = "auto";

}, 500);

}

</script>

</body>

</html>
